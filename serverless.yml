service: api-question-answering
frameworkVersion: "4"

provider:
  name: aws
  runtime: python3.12
  region: us-east-1
  memorySize: 1024
  timeout: 25

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - sagemaker:InvokeEndpoint
          Resource: "*"

functions:
  qaPrediction:
    handler: QAPrediction.lambda_handler
    events:
      - http:
          path: preguntar
          method: post
          cors: true
